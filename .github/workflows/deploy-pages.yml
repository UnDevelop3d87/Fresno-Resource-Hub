name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

environments:
  deploy:
    url: https://github.com/UnDevelop3d87/Fresno-Resource-Hub

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16

      - name: Install dependencies
        run: npm install

      - name: Deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v2
        with:
          path: '.'
